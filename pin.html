<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="pin.css">
</head>
<body>
    <div class="overlay">

    <div class="pin-modal">

        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M7 10V7a5 5 0 0110 0v3"/>
                <rect x="5" y="10" width="14" height="11"/>
            </svg>
        </div>

        <h1>Create PIN</h1>

        <p>
            Your PIN adds an extra layer of security to
            <br>
            your Cowrywise account
        </p>

        <label>Create your PIN</label>

        <div class="pin-inputs">
            <input type="password" maxlength="1" class="pin-create">
            <input type="password" maxlength="1" class="pin-create">
            <input type="password" maxlength="1" class="pin-create">
            <input  type="password" maxlength="1" class="pin-create">
        </div>

        <label>Confirm your PIN</label>

        <div class="pin-inputs">
            <input type="password" maxlength="1" class="pin-confirm">
            <input type="password" maxlength="1" class="pin-confirm">
            <input type="password" maxlength="1" class="pin-confirm">
            <input type="password" maxlength="1" class="pin-confirm">
        </div>
<button id="savePin">Create PIN</button>

    </div>
</div>
</body>
<script src="pin.js"></script>
</html>
